name: Update MySQL Version

on:
  schedule:
    - cron: '0 2 1 * *'  # 每月1日 02:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - name: Fetch latest version from APT repository
        id: latest
        run: |
          version=$(curl -fsSL \
            'http://repo.mysql.com/apt/debian/dists/bookworm/mysql-8.4-lts/binary-amd64/Packages' \
            | awk '/^Package: mysql-community-server-core/{found=1} found && /^Version:/{print $2; exit}')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Get current version from Dockerfile
        id: current
        run: |
          version=$(grep '^ENV MYSQL_VERSION=' 8.4/Dockerfile.debian | cut -d= -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Update files if version changed
        if: steps.latest.outputs.version != steps.current.outputs.version
        env:
          LATEST: ${{ steps.latest.outputs.version }}
        run: |
          mysql_version=$(echo "$LATEST" | cut -d- -f1)

          sed -i "s/^ENV MYSQL_VERSION=.*/ENV MYSQL_VERSION=${LATEST}/" 8.4/Dockerfile.debian

          jq --arg v "$mysql_version" --arg dv "$LATEST" \
            '.["8.4"].version = $v | .["8.4"].debian.version = $dv' \
            versions.json > versions.json.tmp && mv versions.json.tmp versions.json

      - name: Open PR
        if: steps.latest.outputs.version != steps.current.outputs.version
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update MySQL to ${{ steps.latest.outputs.version }}"
          title: "chore: update MySQL to ${{ steps.latest.outputs.version }}"
          body: |
            Automated version bump from `${{ steps.current.outputs.version }}` to `${{ steps.latest.outputs.version }}`.

            Source: http://repo.mysql.com/apt/debian/dists/bookworm/mysql-8.4-lts/binary-amd64/Packages
          branch: update/mysql-${{ steps.latest.outputs.version }}
          delete-branch: true
