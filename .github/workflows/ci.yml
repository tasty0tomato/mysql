name: Build and Test

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Debian image
        run: docker build -f 8.4/Dockerfile.debian 8.4/ -t mysql-debian:8.4-test

      - name: Smoke test
        run: |
          docker run -d --name test-mysql \
            -e MYSQL_ROOT_PASSWORD=test \
            mysql-debian:8.4-test
          for i in $(seq 1 30); do
            if docker exec test-mysql mysqladmin ping -uroot -ptest --silent 2>/dev/null; then
              break
            fi
            sleep 2
          done
          docker exec test-mysql mysql -uroot -ptest -e "SELECT VERSION();"
          docker stop test-mysql
          docker rm test-mysql
