name: Build and Test

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Debian image
        run: docker build -f 8.4/Dockerfile.debian 8.4/ -t mysql-debian:8.4-test

      - name: Smoke test
        run: |
          docker run -d --name test-mysql \
            -e MYSQL_ROOT_PASSWORD=test \
            mysql-debian:8.4-test
          for i in $(seq 1 60); do
            if docker exec test-mysql mysql -uroot -ptest -e "SELECT 1" 2>/dev/null; then
              break
            fi
            sleep 2
          done
          docker exec test-mysql mysql -uroot -ptest -e "SELECT VERSION();"
          docker stop test-mysql
          docker rm test-mysql

  push:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from versions.json
        id: version
        run: |
          full=$(jq -r '.["8.4"].debian.version' versions.json)   # e.g. 8.4.9-1debian12
          short=$(echo "$full" | cut -d- -f1)                      # e.g. 8.4.9
          echo "full=$full" >> "$GITHUB_OUTPUT"
          echo "short=$short" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/mysql
          tags: |
            type=raw,value=8.4
            type=raw,value=${{ steps.version.outputs.short }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: 8.4
          file: 8.4/Dockerfile.debian
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
